{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">Welcome Back</h2>
                <form method="POST" action="">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required
                            autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password"
                            required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Log In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3 border-0 rounded-bottom-4">
                <small class="text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}"
                        class="text-primary fw-bold text-decoration-none">Sign Up</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
